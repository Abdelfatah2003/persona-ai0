<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... - PersonaAI</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            
            if (user && user.email) {
                const traits = localStorage.getItem('personality_traits');
                if (traits) {
                    window.location.href = 'profile.html';
                } else {
                    window.location.href = 'quiz-FIXED.html';
                }
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</head>
<body>
    <p style="text-align: center; padding: 50px; color: white; font-family: sans-serif;">Redirecting...</p>
</body>
</html>
