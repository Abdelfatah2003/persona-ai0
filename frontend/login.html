<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="signIn">Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
        }
        .auth-card h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-group input::placeholder {
            color: var(--text-secondary);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn-full {
            width: 100%;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .tab-container {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            border-radius: 0.75rem;
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background: var(--gradient-primary);
            color: white;
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 2rem;
            width: 100%;
            justify-content: space-between;
        }
        
        .nav-links {
            display: flex;
            list-style: none;
            gap: 0.5rem;
        }
        
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover,
        .nav-link.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .nav-user-logged {
            display: flex;
            gap: 0.75rem;
        }
        
        .mobile-menu-btn {
            display: none;
            flex-direction: column;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }
        
        .mobile-menu-btn span {
            width: 24px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        @media (max-width: 992px) {
            .nav-menu {
                position: fixed;
                top: 70px;
                left: 0;
                right: 0;
                background: rgba(15, 23, 42, 0.98);
                flex-direction: column;
                padding: 2rem;
                gap: 1.5rem;
                transform: translateY(-100%);
                opacity: 0;
                visibility: hidden;
                transition: all 0.3s ease;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            
            .nav-menu.active {
                transform: translateY(0);
                opacity: 1;
                visibility: visible;
            }
            
            .nav-links {
                flex-direction: column;
                width: 100%;
                text-align: center;
            }
            
            .nav-link {
                display: block;
                padding: 1rem;
            }
            
            .nav-actions {
                flex-direction: column;
                width: 100%;
            }
            
            .mobile-menu-btn {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/>
                    <path d="M12 14c-4 0-8 2-8 4v2h16v-2c0-2-4-4-8-4z"/>
                </svg>
                <span data-i18n="logo">PersonaAI</span>
            </a>
            
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <span></span>
                <span></span>
                <span></span>
            </button>
            
            <div class="nav-menu" id="navMenu">
                <ul class="nav-links">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="index.html#about" class="nav-link">About</a></li>
                </ul>
                
                <div class="nav-actions">
                    <div class="nav-user" id="navUserLogged" style="display: none;">
                        <a href="profile.html" class="nav-profile-link">
                            <div class="user-avatar" id="userAvatarLogged">U</div>
                            <span class="user-name" id="userNameLogged">User</span>
                        </a>
                        <a href="#" class="btn btn-outline btn-logout" onclick="handleLogout()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                                <polyline points="16,17 21,12 16,7"/>
                                <line x1="21" y1="12" x2="9" y2="12"/>
                            </svg>
                        </a>
                    </div>
                    
                    <button class="lang-toggle" onclick="toggleLanguage()">
                        <span class="lang-en">EN</span>
                        <span class="lang-separator">/</span>
                        <span class="lang-ar">عربي</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('login')" id="loginTab" data-i18n="signIn">Sign In</button>
                <button class="tab-btn" onclick="switchTab('register')" id="registerTab" data-i18n="register">Register</button>
            </div>

            <div id="loginSection" class="form-section active">
                <h1 data-i18n="welcomeBack">Welcome Back</h1>
                <p class="auth-subtitle" data-i18n="loginSubtitle">Enter your credentials to continue</p>
                
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label data-i18n="email">Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="password">Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" data-i18n="signIn">Sign In</button>
                </form>
            </div>

            <div id="registerSection" class="form-section">
                <h1 data-i18n="createAccount">Create Account</h1>
                <p class="auth-subtitle" data-i18n="registerSubtitle">Start your personality journey today</p>
                
                <form onsubmit="handleRegister(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label data-i18n="firstName">First Name</label>
                            <input type="text" id="firstName" placeholder="Ahmed" required>
                        </div>
                        <div class="form-group">
                            <label data-i18n="lastName">Last Name</label>
                            <input type="text" id="lastName" placeholder="Ali" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label data-i18n="email">Email</label>
                        <input type="email" id="registerEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="age">Age</label>
                        <input type="number" id="age" min="10" max="100" placeholder="25" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="goal">Main Career Goal</label>
                        <input type="text" id="goal" placeholder="I want to become a software developer" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="password">Password</label>
                        <input type="password" id="registerPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full" data-i18n="createAcc">Create Account</button>
                </form>
            </div>

            <div class="auth-footer">
                <a href="index.html" data-i18n="backHome">Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user && user.email) {
                try {
                    const response = await fetch(`http://localhost:5000/api/personality/get/${encodeURIComponent(user.email)}`);
                    if (response.ok) {
                        const data = await response.json();
                        if (data.openness !== undefined) {
                            localStorage.setItem('personality_traits', JSON.stringify({
                                openness: data.openness,
                                conscientiousness: data.conscientiousness,
                                extraversion: data.extraversion,
                                agreeableness: data.agreeableness,
                                neuroticism: data.neuroticism
                            }));
                            window.location.href = 'profile.html';
                            return;
                        }
                    }
                } catch (e) {}
                window.location.href = 'quiz-FIXED.html';
                return;
            }
            
            initLoginAuthState();
        });
        
        function initLoginAuthState() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            const navUserLogged = document.getElementById('navUserLogged');
            const userAvatar = document.getElementById('userAvatarLogged');
            const userName = document.getElementById('userNameLogged');
            
            if (user && user.email) {
                navUserLogged.style.display = 'flex';
                if (userName) userName.textContent = user.name ? user.name.split(' ')[0] : user.email.split('@')[0];
                if (userAvatar) userAvatar.textContent = (user.name || user.email).charAt(0).toUpperCase();
            }
        }
    </script>
</body>
</html>
